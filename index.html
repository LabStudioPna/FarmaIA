<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LABStudio.pna — Web que vende. Desde Paraná.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #16161f;
            --bg-card-hover: #1c1c28;
            --text-primary: #f0f0f5;
            --text-secondary: #a0a0b0;
            --text-muted: #6b6b7b;
            --accent-orange: #ff6b35;
            --accent-pink: #e0569a;
            --accent-purple: #8b5cf6;
            --accent-gradient: linear-gradient(135deg, #ff6b35 0%, #e0569a 50%, #8b5cf6 100%);
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(255,255,255,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ===== HERO ===== */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(255,107,53,0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(139,92,246,0.06) 0%, transparent 50%);
            pointer-events: none;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.2rem;
            border-radius: 100px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            position: relative;
            z-index: 1;
        }

        .hero-badge .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .hero h1 {
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 800;
            line-height: 1.05;
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 1;
        }

        .hero h1 .gradient {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: var(--text-secondary);
            max-width: 600px;
            margin-bottom: 2.5rem;
            position: relative;
            z-index: 1;
        }

        .hero-location {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
            margin-bottom: 2.5rem;
            position: relative;
            z-index: 1;
        }

        .hero-cta {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.9rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: white;
            box-shadow: 0 4px 24px rgba(255,107,53,0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(255,107,53,0.4);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-hover);
        }

        /* ===== SECTIONS COMMON ===== */
        section {
            padding: 6rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .section-header h2 {
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 700;
            margin-bottom: 0.8rem;
        }

        .section-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .section-label {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent-orange);
            margin-bottom: 1rem;
        }

        /* ===== PRODUCT SELECTOR ===== */
        .selector-section {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 3rem 2rem;
            margin: 2rem auto;
            max-width: 1100px;
            border: 1px solid var(--border);
        }

        .selector-title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: var(--text-primary);
        }

        .selector-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
        }

        .selector-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .selector-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-purple);
            transform: translateY(-3px);
        }

        .selector-card .icon {
            font-size: 1.8rem;
        }

        .selector-card h4 {
            font-size: 1rem;
            font-weight: 600;
        }

        .selector-card p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .selector-card .arrow {
            font-size: 0.8rem;
            color: var(--accent-orange);
            margin-top: auto;
            font-weight: 600;
        }

        /* ===== PRODUCTS ===== */
        .products-section {
            max-width: 1100px;
        }

        .product-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 3rem;
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
            transition: border-color 0.3s ease;
        }

        .product-card:hover {
            border-color: var(--border-hover);
        }

        .product-card:nth-child(even) {
            direction: rtl;
        }

        .product-card:nth-child(even) > * {
            direction: ltr;
        }

        .product-content {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .product-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.35rem 0.9rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            width: fit-content;
        }

        .badge-fisco { background: rgba(34,197,94,0.15); color: #22c55e; }
        .badge-miprop { background: rgba(139,92,246,0.15); color: #a78bfa; }
        .badge-campo { background: rgba(234,179,8,0.15); color: #eab308; }
        .badge-constructor { background: rgba(255,107,53,0.15); color: #ff6b35; }

        .product-content h3 {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .product-content .hook {
            font-size: 1.1rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .product-features {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .product-features li {
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .product-features li::before {
            content: '✓';
            color: var(--accent-orange);
            font-weight: 700;
            flex-shrink: 0;
        }

        .product-stats {
            display: flex;
            gap: 2rem;
            padding: 1.2rem 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .product-cta {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .product-visual {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .product-visual::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(255,107,53,0.1) 0%, transparent 70%);
        }

        .demo-placeholder {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 16/10;
            background: var(--bg-primary);
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            position: relative;
            z-index: 1;
        }

        .demo-placeholder .demo-icon {
            font-size: 3rem;
            opacity: 0.5;
        }

        .demo-placeholder p {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* ===== SERVICES ===== */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .service-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            transition: all 0.3s ease;
        }

        .service-card:hover {
            border-color: var(--accent-purple);
            transform: translateY(-4px);
        }

        .service-card .ch {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--accent-orange);
            margin-bottom: 1rem;
        }

        .service-card h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.6rem;
        }

        .service-card p {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .service-card .tag {
            display: inline-block;
            margin-top: 1.2rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* ===== PROCESS ===== */
        .process-section {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 4rem 3rem;
            border: 1px solid var(--border);
        }

        .process-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-top: 3rem;
        }

        .process-step {
            text-align: center;
            position: relative;
        }

        .process-step .number {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--accent-orange);
            margin: 0 auto 1.2rem;
        }

        .process-step h4 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .process-step p {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* ===== WHY US ===== */
        .why-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }

        .why-card {
            text-align: center;
            padding: 2rem;
        }

        .why-card h4 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.6rem;
        }

        .why-card p {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* ===== CONTACT ===== */
        .contact-section {
            text-align: center;
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 4rem 2rem;
            border: 1px solid var(--border);
        }

        .contact-section h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .contact-section p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .contact-cta {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 900px) {
            .product-card {
                grid-template-columns: 1fr;
                padding: 2rem;
            }
            .product-card:nth-child(even) {
                direction: ltr;
            }
            .process-grid, .why-grid {
                grid-template-columns: 1fr;
            }
            .product-stats {
                gap: 1.5rem;
            }
        }

        @media (max-width: 600px) {
            section { padding: 4rem 1.5rem; }
            .selector-section { padding: 2rem 1.5rem; }
            .process-section { padding: 3rem 1.5rem; }
            .product-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
